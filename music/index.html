<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Musical Duck</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #181a20;
            --text-main: #ffffff;
            --text-dim: #a0a5b5;
            --bandlab-red: #e02424;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pfp-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid var(--bandlab-red);
            background: #252833;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pfp-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pfp-placeholder {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .bio {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-bandlab {
            background-color: var(--bandlab-red);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(224, 36, 36, 0.3);
        }

        .btn-bandlab:hover {
            filter: brightness(1.1);
        }

        .btn-secondary {
            background-color: #252833;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-secondary:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Picture Space -->
        <div class="pfp-container">
            <!-- Place your profile picture image file path here -->
            <img src="https://bl-prod-images.azureedge.net/v1.0/users/cab9092d-f9ea-4445-a0a5-012715497aa4/130x130" alt="The Musical Duck" onerror="this.style.display='none';">
            <span class="pfp-placeholder"></span>
        </div>

        <!-- Artist Info -->
        <h1>The Musical Duck</h1>
        <p class="bio">Hey! Just a musical duck here :)</p>

        <!-- Links -->
        <div class="links-list">
            <a href="https://www.bandlab.com/the_musical_duck" target="_blank" class="btn btn-bandlab">
                BandLab
            </a>
            <a href="https://www.bandlab.com/the_musical_duck/gear" class="btn btn-secondary">
                My Gear
            </a>
            <a href="mailto:quack@duckers.dev" class="btn btn-secondary">
                Contact & Collaborations
            </a>
        </div>
    </div>

</body>
</html>
