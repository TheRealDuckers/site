<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        :root {
            --bg: #FFDE4D;
            --card-bg: #FFFFFF;
            --accent-red: #FF5A5F;
            --accent-blue: #38A3A5;
            --accent-green: #52B788;
            --text: #000000;
            --border-thick: 4px solid #000000;
            --shadow-main: 12px 12px 0px #000000;
            --shadow-btn: 5px 5px 0px #000000;
            --shadow-btn-active: 1px 1px 0px #000000;
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }

        .player-card {
            background: var(--card-bg);
            border: var(--border-thick);
            box-shadow: var(--shadow-main);
            padding: 40px;
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .header-section {
            grid-column: 1 / -1;
            border-bottom: var(--border-thick);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 {
            margin: 0;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .system-status {
            background: #000;
            color: #fff;
            padding: 5px 15px;
            font-size: 14px;
        }

        .left-column, .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .file-name {
            background: #F0F0F0;
            border: var(--border-thick);
            padding: 15px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 52px;
        }

        .file-input-wrapper {
            width: 100%;
        }

        .file-label {
            display: block;
            background: var(--accent-blue);
            border: var(--border-thick);
            box-shadow: var(--shadow-btn);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 16px;
        }

        .file-label:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px #000000;
        }

        .file-label:active {
            transform: translate(4px, 4px);
            box-shadow: var(--shadow-btn-active);
        }

        input[type="file"] {
            display: none;
        }

        .controls-row {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            background: var(--accent-red);
            border: var(--border-thick);
            color: #000000;
            padding: 15px;
            font-size: 18px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--shadow-btn);
        }

        button:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px #000000;
        }

        button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: var(--shadow-btn-active);
        }

        button:disabled {
            background: #D3D3D3;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .export-btn {
            background: var(--accent-green);
        }

        .slider-group {
            border: var(--border-thick);
            padding: 15px;
            background: #FFFFFF;
            box-shadow: 4px 4px 0px #000000;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .slider-val {
            background: #000000;
            color: #FFFFFF;
            padding: 2px 8px;
        }

        .fine-tune-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .fine-tune-btn {
            background: #FFF;
            box-shadow: 2px 2px 0px #000;
            font-size: 12px;
            padding: 5px 10px;
            flex: none;
            width: 35px;
            text-align: center;
        }

        .fine-tune-btn:hover:not(:disabled) {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #000;
        }

        .fine-tune-btn:active:not(:disabled) {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: #000000;
            height: 8px;
            outline: none;
            flex-grow: 1;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--bg);
            border: 3px solid #000000;
            cursor: pointer;
            border-radius: 0;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--bg);
            border: 3px solid #000000;
            cursor: pointer;
            border-radius: 0;
        }

        .timeline-container {
            grid-column: 1 / -1;
            background: #000000;
            color: #FFFFFF;
            border: var(--border-thick);
            padding: 20px;
            box-shadow: 6px 6px 0px #000000;
        }

        .timeline-container input[type="range"] {
            background: #FFFFFF;
        }

        .timeline-container input[type="range"]::-webkit-slider-thumb {
            background: var(--accent-red);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="header-section">
        <h2>DESKTOP AUDIO LAB</h2>
        <div class="system-status" id="sysStatus">DSP: OFFLINE</div>
    </div>

    <!-- Left Column: Source Management -->
    <div class="left-column">
        <div class="file-input-wrapper">
            <label class="file-label" for="audioFile">CHOOSE AUDIO FILE</label>
            <input type="file" id="audioFile" accept="audio/*">
        </div>
        
        <div class="file-name" id="fileName">FILE: NULL</div>

        <div class="controls-row">
            <button id="playBtn" disabled>PLAY</button>
            <button id="stopBtn" disabled>STOP</button>
        </div>

        <div class="controls-row">
            <button id="exportBtn" class="export-btn" disabled>EXPORT WAV</button>
        </div>

        <!-- Volume Module -->
        <div class="slider-group">
            <div class="slider-header">
                <span>MASTER VOLUME</span>
                <span class="slider-val" id="volVal">100%</span>
            </div>
            <div class="fine-tune-container">
                <button class="fine-tune-btn" onclick="adjust('volumeSlider', -5)">-</button>
                <input type="range" id="volumeSlider" min="0" max="150" value="100" step="1">
                <button class="fine-tune-btn" onclick="adjust('volumeSlider', 5)">+</button>
            </div>
        </div>
    </div>

    <!-- Right Column: Extended Range Parameters -->
    <div class="right-column">
        <!-- Tempo Slider -->
        <div class="slider-group">
            <div class="slider-header">
                <span>TEMPO (TIME STRETCH)</span>
                <span class="slider-val" id="tempoVal">1.00x</span>
            </div>
            <div class="fine-tune-container">
                <button class="fine-tune-btn" onclick="adjust('tempoSlider', -0.01)">-</button>
                <input type="range" id="tempoSlider" min="0.25" max="4.0" value="1.0" step="0.01">
                <button class="fine-tune-btn" onclick="adjust('tempoSlider', 0.01)">+</button>
            </div>
        </div>

        <!-- Pitch Slider -->
        <div class="slider-group">
            <div class="slider-header">
                <span>PITCH ALTERATION (SEMITONES)</span>
                <span class="slider-val" id="pitchVal">0</span>
            </div>
            <div class="fine-tune-container">
                <button class="fine-tune-btn" onclick="adjust('pitchSlider', -1)">-</button>
                <input type="range" id="pitchSlider" min="-24" max="24" value="0" step="1">
                <button class="fine-tune-btn" onclick="adjust('pitchSlider', 1)">+</button>
            </div>
        </div>

        <!-- Speed Slider -->
        <div class="slider-group">
            <div class="slider-header">
                <span>RESAMPLE RATE (VINYL MODE)</span>
                <span class="slider-val" id="speedVal">1.00x</span>
            </div>
            <div class="fine-tune-container">
                <button class="fine-tune-btn" onclick="adjust('speedSlider', -0.01)">-</button>
                <input type="range" id="speedSlider" min="0.25" max="4.0" value="1.0" step="0.01">
                <button class="fine-tune-btn" onclick="adjust('speedSlider', 0.01)">+</button>
            </div>
        </div>
    </div>

    <!-- Base: Structural Monitor Timeline -->
    <div class="timeline-container">
        <div class="slider-header">
            <span>TIMELINE TRACKER</span>
        </div>
        <input type="range" id="timeline" min="0" max="100" value="0" step="0.01" disabled>
        <div class="time-display">
            <span id="currTime">0:00.00</span>
            <span id="durTime">0:00.00</span>
        </div>
    </div>
</div>

<script>
    let audioCtx = null;
    let audioBuffer = null;
    let sourceNode = null;
    let gainNode = null;
    
    let isPlaying = false;
    let startTime = 0; 
    let pausedAt = 0; 
    let duration = 0;
    let progressInterval = null;
    let loadedFileName = "processed_track";

    const fileInput = document.getElementById('audioFile');
    const fileName = document.getElementById('fileName');
    const sysStatus = document.getElementById('sysStatus');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const timeline = document.getElementById('timeline');
    const currTimeTxt = document.getElementById('currTime');
    const durTimeTxt = document.getElementById('durTime');
    
    const volumeSlider = document.getElementById('volumeSlider');
    const volVal = document.getElementById('volVal');
    const tempoSlider = document.getElementById('tempoSlider');
    const tempoVal = document.getElementById('tempoVal');
    const pitchSlider = document.getElementById('pitchSlider');
    const pitchVal = document.getElementById('pitchVal');
    const speedSlider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');

    window.adjust = function(id, amount) {
        const input = document.getElementById(id);
        const nextVal = parseFloat(input.value) + amount;
        if (nextVal >= input.min && nextVal <= input.max) {
            input.value = nextVal;
            input.dispatchEvent(new Event('input'));
            input.dispatchEvent(new Event('change'));
        }
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loadedFileName = file.name.split('.').slice(0, -1).join('.') || "processed_track";
        fileName.textContent = `FILE: ${file.name.toUpperCase()}`;
        stopPlayback();
        
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        sysStatus.textContent = "DSP: DECODING...";
        const arrayBuffer = await file.arrayBuffer();
        
        try {
            audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            duration = audioBuffer.duration;
            durTimeTxt.textContent = formatTime(duration);
            timeline.max = duration;
            timeline.disabled = false;
            playBtn.disabled = false;
            stopBtn.disabled = false;
            exportBtn.disabled = false;
            sysStatus.textContent = "DSP: READY";
            resetParameters();
        } catch (err) {
            sysStatus.textContent = "DSP: DECODING ERROR";
            alert('Error parsing audio asset file.');
        }
    });

    playBtn.addEventListener('click', () => {
        if (isPlaying) {
            pausePlayback();
        } else {
            startPlayback(pausedAt);
        }
    });

    stopBtn.addEventListener('click', stopPlayback);
    exportBtn.addEventListener('click', exportProcessedAudio);

    timeline.addEventListener('input', () => {
        clearInterval(progressInterval);
        currTimeTxt.textContent = formatTime(timeline.value);
    });

    timeline.addEventListener('change', () => {
        pausedAt = parseFloat(timeline.value);
        if (isPlaying) {
            stopEngine();
            startPlayback(pausedAt);
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        volVal.textContent = e.target.value + '%';
        if (gainNode && audioCtx) {
            gainNode.gain.setValueAtTime(e.target.value / 100, audioCtx.currentTime);
        }
    });

    tempoSlider.addEventListener('input', (e) => {
        tempoVal.textContent = parseFloat(e.target.value).toFixed(2) + 'x';
    });
    tempoSlider.addEventListener('change', updateAudioEngine);

    pitchSlider.addEventListener('input', (e) => {
        pitchVal.textContent = e.target.value > 0 ? `+${e.target.value}` : e.target.value;
    });
    pitchSlider.addEventListener('change', updateAudioEngine);

    speedSlider.addEventListener('input', (e) => {
        speedVal.textContent = parseFloat(e.target.value).toFixed(2) + 'x';
    });
    speedSlider.addEventListener('change', updateAudioEngine);

    function startPlayback(resumePosition = 0) {
        if (!audioBuffer) return;
        
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        sourceNode = audioCtx.createBufferSource();
        gainNode = audioCtx.createGain();
        
        sourceNode.buffer = audioBuffer;
        gainNode.gain.setValueAtTime(volumeSlider.value / 100, audioCtx.currentTime);

        applyDSP(sourceNode, parseFloat(tempoSlider.value), parseInt(pitchSlider.value), parseFloat(speedSlider.value));

        sourceNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (resumePosition >= duration) resumePosition = 0;
        sourceNode.start(0, resumePosition);
        
        isPlaying = true;
        playBtn.textContent = 'PAUSE';
        sysStatus.textContent = "DSP: STREAMING";
        
        startTime = audioCtx.currentTime - (resumePosition / getCombinedPlaybackRate());
        pausedAt = resumePosition;

        startProgressTimer();
    }

    function stopEngine() {
        if (sourceNode) {
            try { sourceNode.stop(); } catch(e) {}
            sourceNode.disconnect();
            sourceNode = null;
        }
        if (gainNode) {
            gainNode.disconnect();
            gainNode = null;
        }
    }

    function pausePlayback() {
        if (!isPlaying) return;
        isPlaying = false;
        playBtn.textContent = 'PLAY';
        sysStatus.textContent = "DSP: PAUSED";
        clearInterval(progressInterval);
        pausedAt = parseFloat(timeline.value);
        stopEngine();
    }

    function stopPlayback() {
        isPlaying = false;
        playBtn.textContent = 'PLAY';
        if(audioBuffer) sysStatus.textContent = "DSP: READY";
        clearInterval(progressInterval);
        stopEngine();
        pausedAt = 0;
        timeline.value = 0;
        currTimeTxt.textContent = "0:00.00";
    }

    function applyDSP(node, tempo, pitchSemitones, resamplingSpeed) {
        if (!node) return;

        const pitchRatio = Math.pow(2, pitchSemitones / 12);
        const dynamicPlaybackRate = pitchRatio * resamplingSpeed;
        
        node.playbackRate.value = dynamicPlaybackRate;
        node.detune.value = (pitchSemitones * 100) - (Math.log2(tempo) * 1200);
        node.playbackRate.value = dynamicPlaybackRate * (tempo / pitchRatio);
    }

    function updateAudioEngine() {
        if (!isPlaying) return;
        const currentPos = parseFloat(timeline.value);
        stopEngine();
        startPlayback(currentPos);
    }

    function getCombinedPlaybackRate() {
        return parseFloat(tempoSlider.value) * parseFloat(speedSlider.value);
    }

    function startProgressTimer() {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (!isPlaying) return;
            
            const elapsed = (audioCtx.currentTime - startTime) * getCombinedPlaybackRate();
            timeline.value = elapsed;
            currTimeTxt.textContent = formatTime(elapsed);

            if (elapsed >= duration) {
                stopPlayback();
            }
        }, 30);
    }

    // Offline Render Pipeline for File Export
    async function exportProcessedAudio() {
        if (!audioBuffer) return;

        const tempo = parseFloat(tempoSlider.value);
        const speed = parseFloat(speedSlider.value);
        const pitch = parseInt(pitchSlider.value);
        const volume = parseFloat(volumeSlider.value) / 100;

        // Calculate precise target duration scaled by playback rates
        const combinedRate = tempo * speed;
        const renderDuration = duration / combinedRate;

        sysStatus.textContent = "DSP: EXPORTING...";
        exportBtn.disabled = true;

        // Init target high-fidelity context matrix
        const offlineCtx = new OfflineAudioContext(
            audioBuffer.numberOfChannels,
            audioBuffer.sampleRate * renderDuration,
            audioBuffer.sampleRate
        );

        const offlineSource = offlineCtx.createBufferSource();
        const offlineGain = offlineCtx.createGain();

        offlineSource.buffer = audioBuffer;
        offlineGain.gain.setValueAtTime(volume, 0);

        // Apply matching DSP configurations onto the offline context
        applyDSP(offlineSource, tempo, pitch, speed);

        offlineSource.connect(offlineGain);
        offlineGain.connect(offlineCtx.destination);
        offlineSource.start(0);

        try {
            const renderedBuffer = await offlineCtx.startRendering();
            const wavBlob = bufferToWav(renderedBuffer);
            
            // Build down-stream asset anchor link target
            const url = URL.createObjectURL(wavBlob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = `${loadedFileName}_processed.wav`;
            anchor.click();
            
            // Garbage disposal maintenance 
            URL.revokeObjectURL(url);
            sysStatus.textContent = "DSP: EXPORTED";
        } catch (err) {
            sysStatus.textContent = "DSP: EXPORT ERROR";
            alert("Render pipeline failed.");
        } finally {
            exportBtn.disabled = false;
        }
    }

    // Pure JavaScript AudioBuffer to 16-Bit Stereo WAV encoder
    function bufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const bufferArr = new ArrayBuffer(length);
        const view = new DataView(bufferArr);
        const channels = [];
        let offset = 0;
        let pos = 0;

        // Write WAV Container Headers
        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8); // file length - 8
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt " chunk
        setUint32(16);         // chunk length
        setUint16(1);          // sample format (raw PCM)
        setUint16(numOfChan);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * numOfChan * 2); // byte rate
        setUint16(numOfChan * 2);                     // block align
        setUint16(16);                                // bits per sample
        setUint32(0x61746164);                        // "data" chunk
        setUint32(length - pos - 4);                  // chunk length

        // Interleave Multi-Channel Intersections
        for (let i = 0; i < numOfChan; i++) {
            channels.push(buffer.getChannelData(i));
        }

        while (pos < buffer.length) {
            for (let i = 0; i < numOfChan; i++) {
                let sample = Math.max(-1, Math.min(1, channels[i][pos]));
                // Convert floating point registers cleanly to 16-bit signed PCM integers
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(44 + offset, sample, true);
                offset += 2;
            }
            pos++;
        }

        return new Blob([bufferArr], { type: 'audio/wav' });

        function setUint16(data) {
            view.setUint16(pos, data, true);
            pos += 2;
        }
        function setUint32(data) {
            view.setUint32(pos, data, true);
            pos += 4;
        }
    }

    function resetParameters() {
        volumeSlider.value = 100;
        volVal.textContent = "100%";
        tempoSlider.value = 1.0;
        tempoVal.textContent = "1.00x";
        pitchSlider.value = 0;
        pitchVal.textContent = "0";
        speedSlider.value = 1.0;
        speedVal.textContent = "1.00x";
    }

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return "0:00.00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        const hundredths = Math.floor((seconds % 1) * 100);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}.${hundredths < 10 ? '0' : ''}${hundredths}`;
    }
</script>

</body>
</html>
